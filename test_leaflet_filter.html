<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div id="map" style="width: 400px; height: 400px;"></div>
    <script>
        const map = L.map('map').setView([51.505, -0.09], 13);
        const geojson = {
            "type": "FeatureCollection",
            "features": [
                {"type": "Feature", "properties": {"id": 1}, "geometry": {"type": "Point", "coordinates": [-0.09, 51.505]}},
                {"type": "Feature", "properties": {"id": 2}, "geometry": {"type": "Point", "coordinates": [-0.1, 51.51]}}
            ]
        };
        let allowed = [1, 2];
        const layer = L.geoJSON(null, {
            filter: function(f) { return allowed.includes(f.properties.id); }
        }).addTo(map);
        layer.addData(geojson);
        console.log("Initial count:", layer.getLayers().length); // Should be 2
        
        layer.clearLayers();
        allowed = [1];
        layer.addData(geojson);
        console.log("After clear and addData count:", layer.getLayers().length); // Should be 1
    </script>
</body>
</html>
