<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map Dashboard — DENR CAR Watershed Monitoring</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css?v=3">
  <link rel="stylesheet" href="assets/css/map.css?v=3">

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="map-app">
    <!-- Full-screen map -->
    <div id="map"></div>

    <!-- Loading overlay -->
    <div class="map-loading" id="loading-overlay">
      <div class="map-loading-inner">
        <div class="map-spinner"></div>
        <div class="map-loading-text">Loading boundaries…</div>
      </div>
    </div>

    <!-- Bottom-center: Breadcrumb nav bar (rendered dynamically by APP._updateBreadcrumb) -->
    <div class="map-breadcrumb" id="map-breadcrumb"></div>

    <!-- Outline toggle buttons (rendered dynamically) -->
    <div class="outline-toggles" id="outline-toggles"></div>

    <!-- Basemap switcher — square button beside zoom control -->
    <div class="basemap-switcher" id="basemap-switcher">
      <button class="basemap-btn" id="basemap-btn" onclick="APP._toggleBasemap()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
        <span>Basemap</span>
      </button>
      <div class="basemap-options" id="basemap-options" style="display:none">
        <button class="basemap-option active" data-layer="topo" onclick="APP.switchBasemap('topo')">
          <span class="basemap-thumb topo-thumb"></span>
          <span>Topographic</span>
        </button>
        <button class="basemap-option" data-layer="osm" onclick="APP.switchBasemap('osm')">
          <span class="basemap-thumb osm-thumb"></span>
          <span>Street</span>
        </button>
        <button class="basemap-option" data-layer="satellite" onclick="APP.switchBasemap('satellite')">
          <span class="basemap-thumb satellite-thumb"></span>
          <span>Satellite</span>
        </button>
      </div>
    </div>

    <!-- Back to landing page — top right -->
    <a class="map-back-btn" href="index.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Back to Home page
    </a>

    <!-- Hover label tooltip (custom, follows cursor) -->
    <div class="map-hover-label" id="map-hover-label"></div>

    <!-- Floating info panel — collapsible left sidebar -->
    <div class="info-panel" id="info-panel">
      <div class="info-panel-header">
        <button class="info-panel-collapse" id="info-panel-collapse" onclick="APP.closePanel()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
          <span>Collapse side panel</span>
        </button>
      </div>
      <div class="info-panel-handle" id="info-panel-handle" onclick="APP.togglePanel()">
        <span class="handle-bar"></span>
      </div>
      <div class="info-panel-content" id="info-panel-content"></div>
    </div>

    <!-- Left-edge toggle tab — only visible when panel is closed -->
    <div class="panel-toggle-tab" id="panel-toggle-tab" onclick="APP.togglePanel()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      <span>Expand side panel</span>
    </div>
  </div>

  <script src="assets/js/app.js?v=2"></script>
  <script src="assets/js/map-layers.js?v=2"></script>
  <script src="assets/js/dashboard.js?v=2"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      var loading = document.getElementById('loading-overlay');
      APP.init();

      try {
        await initLayers();
      } catch (err) {
        console.error('Layer initialization failed:', err);
      }

      loading.classList.add('hidden');

      /* Background prefetch deeper levels so drill-downs feel instant */
      APP._prefetchLevel(2);
      APP._prefetchLevel(3);
    });
  </script>
</body>
</html>
