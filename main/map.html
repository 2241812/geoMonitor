<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map Dashboard — DENR CAR Watershed Monitoring</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/map.css">

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="map-app">
    <!-- Full-screen map -->
    <div id="map"></div>

    <!-- Loading overlay -->
    <div class="map-loading" id="loading-overlay">
      <div class="map-loading-inner">
        <div class="map-spinner"></div>
        <div class="map-loading-text">Loading boundaries…</div>
      </div>
    </div>

    <!-- Top-left: Breadcrumb nav bar -->
    <div class="map-breadcrumb" id="map-breadcrumb">
      <button class="breadcrumb-item active" id="bc-region" onclick="APP.drillUp('region')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        CAR Region
      </button>
    </div>

    <!-- Basemap switcher — bottom left -->
    <div class="basemap-switcher" id="basemap-switcher">
      <div class="basemap-label">Basemap</div>
      <div class="basemap-buttons">
        <button class="basemap-btn" data-layer="topo" onclick="APP.switchBasemap('topo')">
          <span class="basemap-thumb topo-thumb"></span>
          <span>Topo</span>
        </button>
        <button class="basemap-btn active" data-layer="osm" onclick="APP.switchBasemap('osm')">
          <span class="basemap-thumb osm-thumb"></span>
          <span>Street</span>
        </button>
        <button class="basemap-btn" data-layer="satellite" onclick="APP.switchBasemap('satellite')">
          <span class="basemap-thumb satellite-thumb"></span>
          <span>Satellite</span>
        </button>
      </div>
    </div>

    <!-- Back to landing button — top right -->
    <a class="map-back-btn" href="index.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </a>

    <!-- Hover label tooltip (custom, follows cursor) -->
    <div class="map-hover-label" id="map-hover-label"></div>

    <!-- Floating info panel — slides in from right on click -->
    <div class="info-panel" id="info-panel">
      <button class="info-panel-close" id="info-panel-close" onclick="APP.closePanel()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="info-panel-content" id="info-panel-content"></div>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/map-init.js"></script>
  <script src="assets/js/map-layers.js"></script>
  <script src="assets/js/dashboard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      var loading = document.getElementById('loading-overlay');
      APP.init();

      try {
        await initLayers();
      } catch (err) {
        console.error('Layer initialization failed:', err);
      }

      loading.classList.add('hidden');
    });
  </script>
</body>
</html>
