<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map Dashboard — DENR CAR Watershed Monitoring</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-layout">
    <div class="map-wrapper">
      <div id="map"></div>
      <div class="loading-overlay" id="loading-overlay">
        <div style="text-align: center;">
          <div style="width: 40px; height: 40px; border: 4px solid #e5e7eb; border-top-color: #059669; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px;"></div>
          <div style="font-size: 14px; color: #374151; font-weight: 500;">Loading GeoJSON data...</div>
        </div>
      </div>
    </div>

    <div class="dashboard-panel" id="dashboard-panel-root">
      <div class="dashboard-header">
        <h1>Watershed Dashboard</h1>
        <div class="subtitle">Click a region on the map to view data</div>
      </div>
      <div class="dashboard-content" id="dashboard-panel">
      </div>
    </div>
  </div>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/map-init.js"></script>
  <script src="assets/js/map-layers.js"></script>
  <script src="assets/js/dashboard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      var loading = document.getElementById('loading-overlay');
      var result = initMap();

      initDashboard();

      try {
        await initLayers(result.map, result.layerControl);
      } catch (err) {
        console.error('Layer initialization failed:', err);
      }

      loading.classList.add('hidden');
    });
  </script>
</body>
</html>
