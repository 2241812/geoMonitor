<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map Dashboard — DENR CAR Watershed Monitoring</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css?v=3">
  <link rel="stylesheet" href="assets/css/map.css?v=9">

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="map-app">
    <!-- Full-screen map -->
    <div id="map"></div>

    <!-- Loading overlay -->
    <div class="map-loading" id="loading-overlay">
      <div class="map-loading-inner">
        <div class="map-spinner"></div>
        <div class="map-loading-text">Loading boundaries…</div>
      </div>
    </div>

    <!-- Back to landing page — top-left -->
    <a class="map-back-btn map-icon-btn" href="index.html" title="Back to home page">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>



    <!-- Top-right controls -->
    <div class="top-right-controls" id="top-right-controls">
      <!-- Fullscreen toggle -->
      <button class="map-fullscreen-btn map-icon-btn" id="map-fullscreen-btn" onclick="APP.toggleFullscreen()" title="Enter fullscreen">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      </button>
      <!-- Source Switcher -->
      <div class="source-toggle-control" id="source-toggle-control">
        <button class="source-toggle-btn active" id="btn-namria" onclick="APP.switchSource('namria')" title="Switch to NAMRIA Data">NAMRIA</button>
        <button class="source-toggle-btn" id="btn-cad" onclick="APP.switchSource('cad')" title="Switch to CAD Data">CAD</button>
      </div>
    </div>

    <!-- Outline toggle buttons (rendered dynamically) -->
    <div class="outline-toggles" id="outline-toggles"></div>

    <!-- Bottom-center controls -->
    <div class="bottom-center-controls">
      <!-- View mode + source switcher row -->
      <div class="top-controls-row">
        <!-- View Mode Toggle: Basins / Boundaries -->
        <div class="view-toggle-control" id="view-toggle-control">
          <button class="view-toggle-btn active" id="btn-view-watersheds" onclick="APP._setViewMode('watersheds')" title="View watershed boundaries">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg>
            Watersheds
          </button>
          <button class="view-toggle-btn" id="btn-view-boundaries" onclick="APP._setViewMode('boundaries')" title="View administrative boundaries">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Boundaries
          </button>
        </div>
      </div>
      <!-- Breadcrumb nav bar -->
      <div class="map-breadcrumb" id="map-breadcrumb"></div>
    </div>

    <!-- Bottom-left Controls wrapper -->
    <div class="bottom-left-controls" id="bottom-left-controls">
      <!-- Basemap switcher -->
      <div class="basemap-switcher" id="basemap-switcher">
      <button class="basemap-btn" id="basemap-btn" onclick="APP._toggleBasemap()" title="Switch basemap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
      </button>
      <div class="basemap-options" id="basemap-options">
        <button class="basemap-option active" data-layer="topo" onclick="APP.switchBasemap('topo')">
          <span class="basemap-thumb topo-thumb"></span>
          <span>Topographic</span>
        </button>
        <button class="basemap-option" data-layer="osm" onclick="APP.switchBasemap('osm')">
          <span class="basemap-thumb osm-thumb"></span>
          <span>Street</span>
        </button>
        <button class="basemap-option" data-layer="satellite" onclick="APP.switchBasemap('satellite')">
          <span class="basemap-thumb satellite-thumb"></span>
          <span>Satellite</span>
        </button>
      </div>
      </div>

      <!-- Boundary overlay dropdown -->
      <div class="boundary-switcher" id="boundary-switcher">
        <button class="map-icon-btn boundary-btn" id="boundary-btn" onclick="APP._toggleBoundaryMenu()" title="Toggle boundary overlays">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </button>
        <div class="boundary-options" id="boundary-options">
          <div class="boundary-options-header">Boundary Overlays</div>
          <label class="boundary-option"><input type="checkbox" data-type="region" onchange="APP._toggleBoundaryLayer('region', this)"><span>Region</span></label>
          <label class="boundary-option"><input type="checkbox" data-type="province" onchange="APP._toggleBoundaryLayer('province', this)"><span>Province</span></label>
          <label class="boundary-option"><input type="checkbox" data-type="municipality" onchange="APP._toggleBoundaryLayer('municipality', this)"><span>Municipality</span></label>
        </div>
      </div>
      
      <!-- Watershed toggle -->
      <div class="watershed-switcher" id="watershed-switcher">
        <button class="map-icon-btn watershed-btn" id="watershed-btn" onclick="APP.toggleWatershedMenu()" title="Toggle Watershed Layers">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"></path>
          </svg>
        </button>
        <div class="watershed-options" id="watershed-options">
          <div class="watershed-options-header">Select Watershed</div>

          <div class="watershed-group-title">Cagayan River Basin</div>
          <label class="watershed-option"><input type="checkbox" value="Upper Chico River Watershed" onchange="APP.updateWatersheds(this)"><span class="ws-label">Upper Chico River</span><span class="ws-outflow">→ Cagayan River</span></label>
          <label class="watershed-option"><input type="checkbox" value="Upper Magat River Watershed" onchange="APP.updateWatersheds(this)"><span class="ws-label">Upper Magat River</span><span class="ws-outflow">→ Cagayan River</span></label>
          <label class="watershed-option"><input type="checkbox" value="Siffu River Watershed" onchange="APP.updateWatersheds(this)"><span class="ws-label">Siffu River</span><span class="ws-outflow">→ Cagayan River</span></label>
          <label class="watershed-option"><input type="checkbox" value="Mallig River Watershed" onchange="APP.updateWatersheds(this)"><span class="ws-label">Mallig River</span><span class="ws-outflow">→ Cagayan River</span></label>
          <label class="watershed-option"><input type="checkbox" value="Zumigui-Ziwanan River Watershed" onchange="APP.updateWatersheds(this)"><span class="ws-label">Zumigui-Ziwanan</span><span class="ws-outflow">→ Babuyan Channel</span></label>

          <div class="watershed-group-title">West Philippine Sea</div>
          <label class="watershed-option"><input type="checkbox" value="Abra River Watershed" onchange="APP.updateWatersheds(this)"><span class="ws-label">Abra River</span><span class="ws-outflow">→ West Philippine Sea</span></label>
          <label class="watershed-option"><input type="checkbox" value="Bayogao River Watershed" onchange="APP.updateWatersheds(this)"><span class="ws-label">Bayogao (Amburayan) River</span><span class="ws-outflow">→ South China Sea</span></label>
          <label class="watershed-option"><input type="checkbox" value="Naguilian River Watershed" onchange="APP.updateWatersheds(this)"><span class="ws-label">Naguilian River</span><span class="ws-outflow">→ West Philippine Sea</span></label>
          <label class="watershed-option"><input type="checkbox" value="Aringay River Watershed" onchange="APP.updateWatersheds(this)"><span class="ws-label">Aringay River</span><span class="ws-outflow">→ Lingayen Gulf</span></label>
          <label class="watershed-option"><input type="checkbox" value="Santa Maria River Watershed" onchange="APP.updateWatersheds(this)"><span class="ws-label">Santa Maria River</span><span class="ws-outflow">→ West Philippine Sea</span></label>

          <div class="watershed-group-title">Lingayen Gulf</div>
          <label class="watershed-option"><input type="checkbox" value="Agno River Watershed" onchange="APP.updateWatersheds(this)"><span class="ws-label">Agno River</span><span class="ws-outflow">→ Lingayen Gulf</span></label>
          <label class="watershed-option"><input type="checkbox" value="Bued River Watershed" onchange="APP.updateWatersheds(this)"><span class="ws-label">Bued River</span><span class="ws-outflow">→ Lingayen Gulf</span></label>

          <div class="watershed-group-title">Babuyan Channel</div>
          <label class="watershed-option"><input type="checkbox" value="Abulug River Watershed" onchange="APP.updateWatersheds(this)"><span class="ws-label">Abulug River</span><span class="ws-outflow">→ Babuyan Channel</span></label>
          <label class="watershed-option"><input type="checkbox" value="Cabicungan River Watershed" onchange="APP.updateWatersheds(this)"><span class="ws-label">Cabicungan River</span><span class="ws-outflow">→ Babuyan Channel</span></label>
        </div>
      </div>
    </div>

    <!-- Hover label tooltip (custom, follows cursor) -->
    <div class="map-hover-label" id="map-hover-label"></div>

    <!-- Floating info panel — collapsible left sidebar -->
    <div class="info-panel" id="info-panel">
      <div class="info-panel-header">
        <div class="header-brand">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/>
          </svg>
          <span>Watershed Monitor</span>
        </div>
        <button class="info-panel-collapse" id="info-panel-collapse" onclick="APP.closePanel()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
      </div>
      <div class="info-panel-handle" id="info-panel-handle" onclick="APP.togglePanel()">
        <span class="handle-bar"></span>
      </div>
      <div class="info-panel-content" id="info-panel-content"></div>
    </div>

    <!-- Left-edge toggle tab — only visible when panel is closed -->
    <div class="panel-toggle-tab" id="panel-toggle-tab" onclick="APP.togglePanel()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/>
      </svg>
      <span>Watershed Monitor</span>
    </div>
  </div>

  <script src="assets/js/app.js?v=8"></script>
  <script src="assets/js/map-layers.js?v=4"></script>
  <script src="assets/js/dashboard.js?v=3"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      var loading = document.getElementById('loading-overlay');
      APP.init();

      try {
        await initLayers();
      } catch (err) {
        console.error('Layer initialization failed:', err);
      }

      loading.classList.add('hidden');

      /* Background prefetch deeper levels so drill-downs feel instant */
      APP._prefetchLevel(2);
      APP._prefetchLevel(3);
    });
  </script>
</body>
</html>
